<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bem-vindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --accent: #e8ff47;
      --accent2: #47ffe8;
      --text: #f0f0f5;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,255,71,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 1;
      padding: 2rem;
      animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232,255,71,0.3);
      padding: 0.3rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.1s cubic-bezier(.16,1,.3,1) both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.2s cubic-bezier(.16,1,.3,1) both;
    }

    h1 span {
      color: var(--accent);
      position: relative;
      display: inline-block;
    }

    p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
      animation: fadeUp 0.8s 0.3s cubic-bezier(.16,1,.3,1) both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      animation: fadeUp 0.8s 0.4s cubic-bezier(.16,1,.3,1) both;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">Acesso registrado</div>
    <h1>Bem-vindo<br />ao nosso <span>portal</span></h1>
    <p>Sua visita foi registrada com sucesso. Obrigado por acessar nossa plataforma.</p>
    <div class="badge">
      <span class="dot"></span>
      Sistema online e monitorando
    </div>
  </div>

  <script>
    // Auto-track on page load via hidden pixel (alternative method)
    // The main tracking happens via /track redirect
  </script>
</body>
</html>
